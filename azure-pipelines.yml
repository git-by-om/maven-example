trigger:
- master

stages:
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.11'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'package'

- stage: Deploy
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: echo "Build artifact received"
      displayName: 'Step 1 - Receive Artifact'
    - script: echo "Deploying to Azure App Service..."
      displayName: 'Step 2 - Deploy'
    - script: echo "Deployment successful! App is live!"
      displayName: 'Step 3 - Verify'